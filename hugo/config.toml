## Basic Configuration

baseurl = "https://zubala.com/"
languageCode = "en-US"
title = "Aleksander Zubala"
theme = "PaperMod"

publishDir = "../"
enableRobotsTXT = true
buildDrafts = false
googleAnalytics = "UA-90751160-1"

## Allow inline HTML in Markdown (needed for some content)
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

## Site Params
[params]
  author = "Aleksander Zubala"
  description = "Mobile Engineer & Tech Lead — iOS, KMP, Swift"
  env = "production"
  dateFormat = "Jan 2, 2006"
  defaultTheme = "auto"        # auto follows system dark/light preference
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = false
  disableSpecial1stPost = true
  hideFooter = false

  ## Profile mode — shown on the homepage
  [params.profileMode]
    enabled = true
    title = "Aleksander Zubala"
    subtitle = "Mobile Engineer · Tech Lead"
    imageUrl = "/img/me.jpg"
    imageWidth = 120
    imageHeight = 120
    imageTitle = "Aleksander Zubala"

    [[params.profileMode.buttons]]
      name = "About"
      url = "/about/"

    [[params.profileMode.buttons]]
      name = "Projects"
      url = "/projects/"

    [[params.profileMode.buttons]]
      name = "Notes"
      url = "/notes/"

